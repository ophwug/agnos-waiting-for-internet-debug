name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test
        run: go test ./...

      - name: Build application
        run: |
          make \
            VERSION="$(git describe --tags --always --dirty)" \
            COMMIT="${GITHUB_SHA::7}" \
            DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Latest automated build of the AGNOS/openpilot setup connectivity debugger. Windows users should download agnos-waiting-for-internet-debug.exe."
          files: |
            agnos-waiting-for-internet-debug.exe
            agnos-waiting-for-internet-debug-darwin
            agnos-waiting-for-internet-debug-linux
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
